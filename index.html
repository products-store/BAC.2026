<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العد التنازلي | 6 جوان</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">العد التنازلي لـ 6 جوان</h1>
        
        <div class="countdown-wrapper" id="countdown">
            <div class="circle-item">
                <div class="circle">
                    <span class="number" id="days">00</span>
                </div>
                <span class="label">يوم</span>
            </div>

            <div class="circle-item">
                <div class="circle">
                    <span class="number" id="hours">00</span>
                </div>
                <span class="label">ساعة</span>
            </div>

            <div class="circle-item">
                <div class="circle">
                    <span class="number" id="minutes">00</span>
                </div>
                <span class="label">دقيقة</span>
            </div>

            <div class="circle-item">
                <div class="circle">
                    <span class="number" id="seconds">00</span>
                </div>
                <span class="label">ثانية</span>
            </div>
        </div>
        
        <div id="expired-message" class="hidden">
            <h2>لقد حان الموعد!</h2>
        </div>

        <button id="change-bg-btn" class="bg-btn">🌄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
